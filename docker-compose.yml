services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.api
    ports:
      - "${PORT:-8080}:8080"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - epidemia_net
    restart: unless-stopped

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile.worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - epidemia_net
    restart: unless-stopped

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-epidemia}
      POSTGRES_USER: ${POSTGRES_USER:-epidemia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-epidemia}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-epidemia} -d ${POSTGRES_DB:-epidemia}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - epidemia_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - epidemia_net

  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - epidemia_net

volumes:
  pg_data:
  redis_data:
  qdrant_data:

networks:
  epidemia_net:
    driver: bridge
